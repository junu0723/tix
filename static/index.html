<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>relay-cli</title>
<style>
:root {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --border: #2a2a2a;
  --text: #e0e0e0;
  --text-muted: #888;
  --accent: #6366f1;
  --accent-hover: #818cf8;
  --p1: #ef4444;
  --p2: #f97316;
  --p3: #eab308;
  --p4: #6b7280;
  --success: #22c55e;
  --radius: 8px;
}
@media (prefers-color-scheme: light) {
  :root {
    --bg: #f5f5f5;
    --surface: #fff;
    --border: #e0e0e0;
    --text: #1a1a1a;
    --text-muted: #666;
  }
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 2rem;
  max-width: 800px;
  margin: 0 auto;
}
h1 { font-size: 1.5rem; margin-bottom: 0.25rem; cursor: pointer; }
.subtitle { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem; }
textarea {
  width: 100%;
  min-height: 200px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  padding: 1rem;
  font-size: 0.9rem;
  font-family: inherit;
  resize: vertical;
}
textarea:focus { outline: none; border-color: var(--accent); }
button {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  padding: 0.6rem 1.2rem;
  font-size: 0.9rem;
  cursor: pointer;
  transition: background 0.15s;
}
button:hover { background: var(--accent-hover); }
button:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-row { display: flex; gap: 0.5rem; margin-top: 1rem; }
.btn-secondary {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text);
}
.btn-secondary:hover { border-color: var(--accent); }
.btn-success { background: var(--success); }
.btn-skip { background: transparent; border: 1px solid var(--border); color: var(--text-muted); font-size: 0.8rem; }
.loading {
  text-align: center;
  padding: 2rem;
  color: var(--text-muted);
  display: none;
}
.loading.active { display: block; }
.loading .spinner {
  display: inline-block;
  width: 20px; height: 20px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  margin-right: 0.5rem;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }
#results { margin-top: 2rem; }
.ticket-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.2rem;
  margin-bottom: 1rem;
  transition: border-color 0.15s;
}
.ticket-card.created { border-color: var(--success); }
.ticket-card.skipped { opacity: 0.4; }
.ticket-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
.priority-badge {
  font-size: 0.7rem;
  font-weight: 700;
  padding: 0.15rem 0.5rem;
  border-radius: 4px;
  color: #fff;
}
.priority-badge.p1 { background: var(--p1); }
.priority-badge.p2 { background: var(--p2); }
.priority-badge.p3 { background: var(--p3); color: #000; }
.priority-badge.p4 { background: var(--p4); }
.ticket-title { font-weight: 600; font-size: 1rem; }
.ticket-desc { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 0.75rem; white-space: pre-wrap; }
.ticket-labels { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
.label {
  font-size: 0.75rem;
  background: var(--border);
  color: var(--text-muted);
  padding: 0.1rem 0.5rem;
  border-radius: 4px;
}
.ticket-actions { display: flex; gap: 0.5rem; align-items: center; }
.ticket-result { font-size: 0.85rem; color: var(--success); font-weight: 500; }
.error { color: var(--p1); font-size: 0.85rem; margin-top: 1rem; }
#bulk-actions { margin-top: 1rem; display: none; }
.edit-field { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text); padding: 0.4rem 0.6rem; font-size: 0.9rem; font-family: inherit; }
.edit-field:focus { outline: none; border-color: var(--accent); }
.edit-desc { min-height: 60px; resize: vertical; }
.edit-row { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 0.5rem; }
.edit-row label { font-size: 0.75rem; color: var(--text-muted); min-width: 55px; }
select.edit-field { padding: 0.35rem 0.4rem; width: auto; }
.toolbar { display: flex; gap: 1rem; align-items: center; margin-bottom: 1.5rem; padding: 0.6rem 0.8rem; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); font-size: 0.85rem; flex-wrap: wrap; }
.toolbar label { color: var(--text-muted); font-size: 0.8rem; }
.toolbar select { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 0.3rem 0.5rem; font-size: 0.85rem; }
</style>
</head>
<body>
<h1 onclick="resetView()">relay-cli</h1>
<p class="subtitle">AI-powered CLI that turns any text into actionable tickets</p>

<div class="toolbar">
  <div>
    <label>Project</label>
    <select id="projectSelect" onchange="switchProject()">
      <option value="">(none)</option>
    </select>
  </div>
  <div>
    <label>Target</label>
    <select id="targetSelect">
      <option value="linear">Linear</option>
      <option value="github">GitHub</option>
    </select>
  </div>
  <div id="projectInfo" style="color:var(--text-muted);font-size:0.8rem;margin-left:auto;cursor:pointer" onclick="toggleProjectContext()" title="Click to edit project context"></div>
</div>
<div id="projectContext" style="display:none;margin-bottom:1rem;padding:0.8rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem">
    <span style="font-size:0.9rem;font-weight:600">Project Context</span>
    <button class="btn-secondary" onclick="saveProjectContext()" style="font-size:0.8rem;padding:0.3rem 0.6rem">Save</button>
  </div>
  <div class="edit-row"><label>Description</label><input class="edit-field" id="ctx-desc" placeholder="What this project does"></div>
  <div class="edit-row"><label>Stack</label><input class="edit-field" id="ctx-stack" placeholder="e.g. Node.js, Express, Linear API"></div>
  <div class="edit-row"><label>Status</label><input class="edit-field" id="ctx-status" placeholder="e.g. MVP done, working on v2"></div>
  <div class="edit-row"><label>Philosophy</label><textarea class="edit-field edit-desc" id="ctx-philosophy" placeholder="Project principles, what to prioritize..."></textarea></div>
  <div id="ctxStatus" style="color:var(--text-muted);font-size:0.8rem;margin-top:0.3rem"></div>
</div>

<textarea id="transcript" placeholder="Paste anything — transcript, notes, to-do list, braindump, doc..."></textarea>
<div class="btn-row">
  <button id="parseBtn" onclick="parseTranscript()">Analyze</button>
  <label class="btn-secondary" style="display:inline-flex;align-items:center;padding:0.6rem 1.2rem;border-radius:var(--radius);cursor:pointer;font-size:0.9rem">
    <input type="file" id="fileInput" accept=".txt,.md,.srt,.vtt,.csv,.tsv" style="display:none" onchange="loadFile(event)">
    Upload file
  </label>
  <button class="btn-secondary" onclick="showGoogleImport()" style="font-size:0.9rem">Import from Google</button>
  <span id="fileName" style="color:var(--text-muted);font-size:0.85rem;align-self:center"></span>
</div>
<div id="google-import" style="display:none;margin-top:0.75rem;padding:0.8rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)">
  <div style="display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap">
    <select id="googleType" style="background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:0.4rem">
      <option value="doc">Google Doc</option>
      <option value="sheet">Google Sheet</option>
    </select>
    <input id="googleUrl" class="edit-field" placeholder="Paste Google Doc or Sheet URL" style="flex:1;min-width:200px">
    <input id="sheetRange" class="edit-field" placeholder="Range (e.g. Sheet1!A1:D20)" style="width:180px;display:none">
    <button onclick="importFromGoogle()">Import</button>
  </div>
  <div id="googleStatus" style="color:var(--text-muted);font-size:0.8rem;margin-top:0.5rem"></div>
</div>

<div id="loading" class="loading">
  <span class="spinner"></span> Claude is analyzing...
</div>

<div id="error" class="error"></div>
<div id="results"></div>
<div id="bulk-actions">
  <button class="btn-success" onclick="createAll()">Create all</button>
</div>

<div id="history-section" style="margin-top:3rem;border-top:1px solid var(--border);padding-top:2rem">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
    <h2 style="font-size:1.1rem">History</h2>
    <span style="display:flex;gap:0.3rem">
      <button class="btn-secondary" onclick="loadHistory()" style="font-size:1.2rem;padding:0.2rem 0.5rem;line-height:1" title="Refresh">&#x21bb;</button>
      <button class="btn-secondary" onclick="toggleDeleteMode()" id="deleteModeBtn" style="font-size:1.2rem;padding:0.2rem 0.5rem;line-height:1" title="Delete mode">&#x2212;</button>
    </span>
  </div>
  <div id="history-list" style="color:var(--text-muted);font-size:0.85rem">Loading...</div>
</div>

<script>
let tickets = [];
let currentHistoryIndex = 0;

function showGoogleImport() {
  const el = document.getElementById('google-import');
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

document.getElementById('googleType')?.addEventListener('change', function() {
  document.getElementById('sheetRange').style.display = this.value === 'sheet' ? 'block' : 'none';
});

function extractGoogleId(url) {
  // Google Doc: /document/d/ID/
  // Google Sheet: /spreadsheets/d/ID/
  const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  return match ? match[1] : url.trim();
}

async function importFromGoogle() {
  const type = document.getElementById('googleType').value;
  const url = document.getElementById('googleUrl').value.trim();
  const range = document.getElementById('sheetRange').value.trim();
  const status = document.getElementById('googleStatus');

  if (!url) return;
  const id = extractGoogleId(url);
  status.textContent = 'Fetching...';

  try {
    const body = { type, id };
    if (type === 'sheet' && range) body.range = range;

    const resp = await fetch('/api/fetch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error);

    document.getElementById('transcript').value = data.text;
    status.textContent = 'Imported! Click Analyze to parse.';
    document.getElementById('google-import').style.display = 'none';
  } catch (e) {
    status.textContent = 'Error: ' + e.message;
  }
}

let projectsData = [];

async function loadProjects() {
  try {
    const resp = await fetch('/api/projects');
    const data = await resp.json();
    projectsData = data.projects || [];
    const sel = document.getElementById('projectSelect');
    sel.innerHTML = '<option value="">(none)</option>';
    projectsData.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.name;
      opt.textContent = p.name;
      if (p.name === data.active) opt.selected = true;
      sel.appendChild(opt);
    });
    updateProjectInfo();
  } catch (e) {}
}

async function switchProject() {
  const name = document.getElementById('projectSelect').value;
  if (name) {
    await fetch('/api/projects/use', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name }),
    });
  }
  updateProjectInfo();
}

function updateProjectInfo() {
  const name = document.getElementById('projectSelect').value;
  const info = document.getElementById('projectInfo');
  const ctxPanel = document.getElementById('projectContext');
  if (!name) { info.textContent = ''; ctxPanel.style.display = 'none'; return; }
  const proj = projectsData.find(p => p.name === name);
  if (!proj) { info.textContent = ''; return; }
  const parts = [];
  if (proj.github_repo) parts.push('GitHub: ' + proj.github_repo);
  if (proj.linear_team_name) parts.push('Linear: ' + proj.linear_team_name);
  else if (proj.linear_team_id) parts.push('Linear: ' + proj.linear_team_id.slice(0, 8) + '...');
  info.textContent = parts.join(' · ') || 'Click to configure';

  // Populate context fields
  document.getElementById('ctx-desc').value = proj.description || '';
  document.getElementById('ctx-stack').value = proj.stack || '';
  document.getElementById('ctx-status').value = proj.status || '';
  document.getElementById('ctx-philosophy').value = proj.philosophy || '';
}

function toggleProjectContext() {
  const name = document.getElementById('projectSelect').value;
  if (!name) return;
  const el = document.getElementById('projectContext');
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

async function saveProjectContext() {
  const name = document.getElementById('projectSelect').value;
  if (!name) return;
  const proj = projectsData.find(p => p.name === name) || {};
  const body = {
    name,
    github_repo: proj.github_repo || undefined,
    linear_team_id: proj.linear_team_id || undefined,
    description: document.getElementById('ctx-desc').value,
    stack: document.getElementById('ctx-stack').value,
    status: document.getElementById('ctx-status').value,
    philosophy: document.getElementById('ctx-philosophy').value,
  };
  try {
    await fetch('/api/projects/update', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    document.getElementById('ctxStatus').textContent = 'Saved!';
    await loadProjects();
    setTimeout(() => document.getElementById('ctxStatus').textContent = '', 2000);
  } catch (e) {
    document.getElementById('ctxStatus').textContent = 'Error: ' + e.message;
  }
}

function getTarget() { return document.getElementById('targetSelect').value; }
function getProject() { return document.getElementById('projectSelect').value || null; }

loadProjects();

function resetView() {
  tickets = [];
  document.getElementById('results').innerHTML = '';
  document.getElementById('bulk-actions').style.display = 'none';
  document.getElementById('error').textContent = '';
  document.getElementById('transcript').value = '';
  document.getElementById('fileName').textContent = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function loadFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('fileName').textContent = file.name;
  const reader = new FileReader();
  reader.onload = function(ev) {
    document.getElementById('transcript').value = ev.target.result;
  };
  reader.readAsText(file);
}

async function parseTranscript() {
  const transcript = document.getElementById('transcript').value.trim();
  if (!transcript) return;

  const btn = document.getElementById('parseBtn');
  const loading = document.getElementById('loading');
  const error = document.getElementById('error');
  const results = document.getElementById('results');

  btn.disabled = true;
  loading.classList.add('active');
  error.textContent = '';
  results.innerHTML = '';
  document.getElementById('bulk-actions').style.display = 'none';

  try {
    const resp = await fetch('/api/parse', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ transcript, project: getProject() }),
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error);

    tickets = data.tickets;
    renderTickets();
  } catch (e) {
    error.textContent = 'Error:' + e.message;
  } finally {
    btn.disabled = false;
    loading.classList.remove('active');
  }
}

function renderTickets() {
  const results = document.getElementById('results');
  results.innerHTML = '';
  const priorityLabels = { 1: 'Urgent', 2: 'High', 3: 'Medium', 4: 'Low' };

  tickets.forEach((t, i) => {
    const card = document.createElement('div');
    card.className = 'ticket-card';
    card.id = 'card-' + i;
    const p = t.priority || 3;
    const labels = (t.labels || []).map(l => '<span class="label">' + esc(l) + '</span>').join('');
    const labelsStr = (t.labels || []).join(', ');
    const alreadyCreated = !!t.linearId;

    if (alreadyCreated) card.classList.add('created');

    card.innerHTML =
      '<div class="view-mode" id="view-' + i + '">' +
        '<div class="ticket-header">' +
          '<span class="priority-badge p' + p + '">P' + p + ' ' + esc(priorityLabels[p] || '') + '</span>' +
          '<span class="ticket-title">' + esc(t.title) + '</span>' +
        '</div>' +
        '<div class="ticket-desc">' + esc(t.description) + '</div>' +
        (labels ? '<div class="ticket-labels">' + labels + '</div>' : '') +
      '</div>' +
      '<div class="edit-mode" id="edit-' + i + '" style="display:none">' +
        '<div class="edit-row"><label>Title</label><input class="edit-field" id="ed-title-' + i + '" value="' + esc(t.title).replace(/"/g,'&quot;') + '"></div>' +
        '<div class="edit-row"><label>Desc</label><textarea class="edit-field edit-desc" id="ed-desc-' + i + '">' + esc(t.description) + '</textarea></div>' +
        '<div class="edit-row"><label>Priority</label><select class="edit-field" id="ed-pri-' + i + '">' +
          '<option value="1"' + (p===1?' selected':'') + '>P1 Urgent</option>' +
          '<option value="2"' + (p===2?' selected':'') + '>P2 High</option>' +
          '<option value="3"' + (p===3?' selected':'') + '>P3 Medium</option>' +
          '<option value="4"' + (p===4?' selected':'') + '>P4 Low</option>' +
        '</select></div>' +
        '<div class="edit-row"><label>Labels</label><input class="edit-field" id="ed-labels-' + i + '" value="' + esc(labelsStr) + '" placeholder="comma separated"></div>' +
      '</div>' +
      '<div class="ticket-actions">' +
        '<button onclick="createOne(' + i + ')"' + (alreadyCreated?' disabled':'') + '>Create</button>' +
        '<button class="btn-secondary" onclick="toggleEdit(' + i + ')" id="editBtn-' + i + '" style="font-size:0.8rem"' + (alreadyCreated?' disabled':'') + '>Edit</button>' +
        '<button class="btn-skip" onclick="skipOne(' + i + ')"' + (alreadyCreated?' disabled':'') + '>Skip</button>' +
        '<span class="ticket-result" id="result-' + i + '">' +
          (alreadyCreated ? '<a href="' + esc(t.linearUrl) + '" target="_blank" style="color:var(--success)">' + esc(t.linearId) + '</a> created' : '') +
        '</span>' +
      '</div>';

    results.appendChild(card);
  });

  if (tickets.length > 0) {
    document.getElementById('bulk-actions').style.display = 'block';
  }
}

function toggleEdit(i) {
  const view = document.getElementById('view-' + i);
  const edit = document.getElementById('edit-' + i);
  const btn = document.getElementById('editBtn-' + i);
  const isEditing = edit.style.display !== 'none';

  if (isEditing) {
    tickets[i].title = document.getElementById('ed-title-' + i).value;
    tickets[i].description = document.getElementById('ed-desc-' + i).value;
    tickets[i].priority = parseInt(document.getElementById('ed-pri-' + i).value);
    tickets[i].labels = document.getElementById('ed-labels-' + i).value.split(',').map(s => s.trim()).filter(Boolean);
    renderTickets();
  } else {
    view.style.display = 'none';
    edit.style.display = 'block';
    btn.textContent = 'Save';
  }
}

async function createOne(i) {
  const result = document.getElementById('result-' + i);
  const card = document.getElementById('card-' + i);
  result.textContent = 'Creating...';
  result.style.color = 'var(--text-muted)';

  try {
    const resp = await fetch('/api/create', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ticket: tickets[i], target: getTarget(), project: getProject() }),
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error);

    tickets[i].linearId = data.id;
    tickets[i].linearUrl = data.url;
    result.style.color = 'var(--success)';
    result.innerHTML = '<a href="' + esc(data.url) + '" target="_blank" style="color:var(--success)">' + esc(data.id) + '</a> created';
    card.classList.add('created');
    card.querySelectorAll('button').forEach(b => b.disabled = true);
    saveTicketsToHistory();
  } catch (e) {
    result.style.color = 'var(--p1)';
    result.textContent = 'Error:' + e.message;
  }
}

function skipOne(i) {
  const card = document.getElementById('card-' + i);
  card.classList.add('skipped');
  card.querySelectorAll('button').forEach(b => b.disabled = true);
  document.getElementById('result-' + i).textContent = 'Skipped';
}

async function createAll() {
  for (let i = 0; i < tickets.length; i++) {
    const card = document.getElementById('card-' + i);
    if (!card.classList.contains('created') && !card.classList.contains('skipped')) {
      await createOne(i);
    }
  }
}

async function loadHistory() {
  const list = document.getElementById('history-list');
  try {
    const resp = await fetch('/api/history');
    const data = await resp.json();
    if (!data.entries || data.entries.length === 0) {
      list.textContent = 'No history yet.';
      return;
    }
    list.innerHTML = data.entries.map((entry, ei) => {
      const date = new Date(entry.timestamp).toLocaleString();
      const created = entry.tickets.filter(t => t.linearId).length;
      const total = entry.tickets.length;
      const badge = created > 0
        ? '<span style="color:var(--success)">' + created + '/' + total + ' created</span>'
        : '<span>' + total + ' ticket(s)</span>';
      const ticketSummary = entry.tickets.map(t => {
        const icon = t.linearId ? '<span style="color:var(--success);margin-right:0.3rem">&#10003;</span>' : '<span style="color:var(--text-muted);margin-right:0.3rem">&#9675;</span>';
        return '<span style="margin-left:1rem;display:block;color:var(--text)">' + icon + esc(t.title) + '</span>';
      }).join('');
      return '<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:0.8rem;margin-bottom:0.5rem;cursor:pointer" onclick="restoreHistory(' + ei + ')">' +
        '<div style="display:flex;justify-content:space-between;align-items:center"><span>' + date + '</span><span style="display:flex;gap:0.5rem;align-items:center">' + badge +
        '<button class="history-delete-btn" onclick="event.stopPropagation();deleteHistory(' + ei + ')" style="display:none;background:none;border:none;color:var(--p1);cursor:pointer;font-size:0.85rem;padding:0.1rem 0.3rem;line-height:1" title="Delete">&#x2715;</button></span></div>' +
        ticketSummary +
      '</div>';
    }).join('');
  } catch (e) {
    list.textContent = 'Failed to load history.';
  }
}

let deleteMode = false;

function toggleDeleteMode() {
  deleteMode = !deleteMode;
  document.getElementById('deleteModeBtn').style.borderColor = deleteMode ? 'var(--p1)' : 'var(--border)';
  document.querySelectorAll('.history-delete-btn').forEach(el => {
    el.style.display = deleteMode ? 'inline' : 'none';
  });
}

async function deleteHistory(ei) {
  await fetch('/api/history/delete', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ index: ei }),
  });
  loadHistory();
}

function restoreHistory(ei) {
  fetch('/api/history').then(r => r.json()).then(data => {
    currentHistoryIndex = ei;
    tickets = data.entries[ei].tickets;
    renderTickets();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
}

function saveTicketsToHistory() {
  fetch('/api/history/update', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ index: currentHistoryIndex, tickets }),
  }).then(() => loadHistory());
}

loadHistory();

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
</script>
