<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>relay-cli</title>
<style>
:root {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --border: #2a2a2a;
  --text: #e0e0e0;
  --text-muted: #888;
  --accent: #6366f1;
  --accent-hover: #818cf8;
  --p1: #ef4444;
  --p2: #f97316;
  --p3: #eab308;
  --p4: #6b7280;
  --success: #22c55e;
  --radius: 8px;
}
@media (prefers-color-scheme: light) {
  :root {
    --bg: #f5f5f5;
    --surface: #fff;
    --border: #e0e0e0;
    --text: #1a1a1a;
    --text-muted: #666;
  }
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 2rem;
  max-width: 800px;
  margin: 0 auto;
}
h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
.subtitle { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem; }
textarea {
  width: 100%;
  min-height: 200px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  padding: 1rem;
  font-size: 0.9rem;
  font-family: inherit;
  resize: vertical;
}
textarea:focus { outline: none; border-color: var(--accent); }
button {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  padding: 0.6rem 1.2rem;
  font-size: 0.9rem;
  cursor: pointer;
  transition: background 0.15s;
}
button:hover { background: var(--accent-hover); }
button:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-row { display: flex; gap: 0.5rem; margin-top: 1rem; }
.btn-secondary {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text);
}
.btn-secondary:hover { border-color: var(--accent); }
.btn-success { background: var(--success); }
.btn-skip { background: transparent; border: 1px solid var(--border); color: var(--text-muted); font-size: 0.8rem; }
.loading {
  text-align: center;
  padding: 2rem;
  color: var(--text-muted);
  display: none;
}
.loading.active { display: block; }
.loading .spinner {
  display: inline-block;
  width: 20px; height: 20px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  margin-right: 0.5rem;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }
#results { margin-top: 2rem; }
.ticket-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.2rem;
  margin-bottom: 1rem;
  transition: border-color 0.15s;
}
.ticket-card.created { border-color: var(--success); }
.ticket-card.skipped { opacity: 0.4; }
.ticket-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
.priority-badge {
  font-size: 0.7rem;
  font-weight: 700;
  padding: 0.15rem 0.5rem;
  border-radius: 4px;
  color: #fff;
}
.priority-badge.p1 { background: var(--p1); }
.priority-badge.p2 { background: var(--p2); }
.priority-badge.p3 { background: var(--p3); color: #000; }
.priority-badge.p4 { background: var(--p4); }
.ticket-title { font-weight: 600; font-size: 1rem; }
.ticket-desc { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 0.75rem; white-space: pre-wrap; }
.ticket-labels { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
.label {
  font-size: 0.75rem;
  background: var(--border);
  color: var(--text-muted);
  padding: 0.1rem 0.5rem;
  border-radius: 4px;
}
.ticket-actions { display: flex; gap: 0.5rem; align-items: center; }
.ticket-result { font-size: 0.85rem; color: var(--success); font-weight: 500; }
.error { color: var(--p1); font-size: 0.85rem; margin-top: 1rem; }
#bulk-actions { margin-top: 1rem; display: none; }
</style>
</head>
<body>
<h1>relay-cli</h1>
<p class="subtitle">Transcript → Linear tickets, powered by Claude</p>

<textarea id="transcript" placeholder="Paste your meeting/call transcript here..."></textarea>
<div class="btn-row">
  <button id="parseBtn" onclick="parseTranscript()">Analyze</button>
  <label class="btn-secondary" style="display:inline-flex;align-items:center;padding:0.6rem 1.2rem;border-radius:var(--radius);cursor:pointer;font-size:0.9rem">
    <input type="file" id="fileInput" accept=".txt,.md,.srt,.vtt" style="display:none" onchange="loadFile(event)">
    Upload file
  </label>
  <span id="fileName" style="color:var(--text-muted);font-size:0.85rem;align-self:center"></span>
</div>

<div id="loading" class="loading">
  <span class="spinner"></span> Claude is analyzing...
</div>

<div id="error" class="error"></div>
<div id="results"></div>
<div id="bulk-actions">
  <button class="btn-success" onclick="createAll()">Create all in Linear</button>
</div>

<script>
let tickets = [];

function loadFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('fileName').textContent = file.name;
  const reader = new FileReader();
  reader.onload = function(ev) {
    document.getElementById('transcript').value = ev.target.result;
  };
  reader.readAsText(file);
}

async function parseTranscript() {
  const transcript = document.getElementById('transcript').value.trim();
  if (!transcript) return;

  const btn = document.getElementById('parseBtn');
  const loading = document.getElementById('loading');
  const error = document.getElementById('error');
  const results = document.getElementById('results');

  btn.disabled = true;
  loading.classList.add('active');
  error.textContent = '';
  results.innerHTML = '';
  document.getElementById('bulk-actions').style.display = 'none';

  try {
    const resp = await fetch('/api/parse', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ transcript }),
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error);

    tickets = data.tickets;
    renderTickets();
  } catch (e) {
    error.textContent = 'Error:' + e.message;
  } finally {
    btn.disabled = false;
    loading.classList.remove('active');
  }
}

function renderTickets() {
  const results = document.getElementById('results');
  results.innerHTML = '';

  const priorityLabels = { 1: 'Urgent', 2: 'High', 3: 'Medium', 4: 'Low' };

  tickets.forEach((t, i) => {
    const card = document.createElement('div');
    card.className = 'ticket-card';
    card.id = 'card-' + i;

    const p = t.priority || 3;
    const labels = (t.labels || []).map(l => '<span class="label">' + esc(l) + '</span>').join('');

    card.innerHTML =
      '<div class="ticket-header">' +
        '<span class="priority-badge p' + p + '">P' + p + ' ' + esc(priorityLabels[p] || '') + '</span>' +
        '<span class="ticket-title">' + esc(t.title) + '</span>' +
      '</div>' +
      '<div class="ticket-desc">' + esc(t.description) + '</div>' +
      (labels ? '<div class="ticket-labels">' + labels + '</div>' : '') +
      '<div class="ticket-actions">' +
        '<button onclick="createOne(' + i + ')">Create in Linear</button>' +
        '<button class="btn-skip" onclick="skipOne(' + i + ')">Skip</button>' +
        '<span class="ticket-result" id="result-' + i + '"></span>' +
      '</div>';

    results.appendChild(card);
  });

  if (tickets.length > 0) {
    document.getElementById('bulk-actions').style.display = 'block';
  }
}

async function createOne(i) {
  const result = document.getElementById('result-' + i);
  const card = document.getElementById('card-' + i);
  result.textContent = 'Creating...';
  result.style.color = 'var(--text-muted)';

  try {
    const resp = await fetch('/api/create', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ticket: tickets[i] }),
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error);

    result.style.color = 'var(--success)';
    result.innerHTML = '<a href="' + esc(data.url) + '" target="_blank" style="color:var(--success)">' + esc(data.id) + '</a> created';
    card.classList.add('created');
    card.querySelectorAll('button').forEach(b => b.disabled = true);
  } catch (e) {
    result.style.color = 'var(--p1)';
    result.textContent = 'Error:' + e.message;
  }
}

function skipOne(i) {
  const card = document.getElementById('card-' + i);
  card.classList.add('skipped');
  card.querySelectorAll('button').forEach(b => b.disabled = true);
  document.getElementById('result-' + i).textContent = 'Skipped';
}

async function createAll() {
  for (let i = 0; i < tickets.length; i++) {
    const card = document.getElementById('card-' + i);
    if (!card.classList.contains('created') && !card.classList.contains('skipped')) {
      await createOne(i);
    }
  }
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
</script>
</body>
</html>
